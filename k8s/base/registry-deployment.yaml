apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferno-registry
  namespace: inferno
  labels:
    app.kubernetes.io/name: inferno-registry
    app.kubernetes.io/component: registry
    app.kubernetes.io/part-of: inferno-cluster
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inferno-registry
      app.kubernetes.io/component: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inferno-registry
        app.kubernetes.io/component: registry
        app.kubernetes.io/part-of: inferno-cluster
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: registry
          image: ghcr.io/echocog/inferno-os:latest
          command: ["emu"]
          args:
            - "-c1"
            - "ndb/registry"
          ports:
            - name: styx
              containerPort: 6675
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          env:
            - name: INFERNO
              valueFrom:
                configMapKeyRef:
                  name: inferno-config
                  key: ROOT
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: styx
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: styx
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
