apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inferno-default-deny
  namespace: inferno
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inferno-registry-policy
  namespace: inferno
  labels:
    app.kubernetes.io/name: inferno-registry
    app.kubernetes.io/part-of: inferno-cluster
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: registry
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: inferno-cluster
      ports:
        - port: 6675
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 6675
          protocol: TCP
    - from:
        - podSelector: {}
      ports:
        - port: 9100
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inferno-cpupool-policy
