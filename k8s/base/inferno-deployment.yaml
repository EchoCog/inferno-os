apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferno
  namespace: inferno
  labels:
    app.kubernetes.io/name: inferno
    app.kubernetes.io/component: emulator
    app.kubernetes.io/part-of: inferno-cluster
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inferno
      app.kubernetes.io/component: emulator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inferno
        app.kubernetes.io/component: emulator
        app.kubernetes.io/part-of: inferno-cluster
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: inferno
          image: ghcr.io/echocog/inferno-os:latest
          command: ["emu"]
          args:
            - "-c1"
          ports:
            - name: styx
              containerPort: 6677
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          env:
            - name: INFERNO
              valueFrom:
                configMapKeyRef:
                  name: inferno-config
                  key: ROOT
            - name: REGISTRY_ADDR
              valueFrom:
                configMapKeyRef:
                  name: inferno-config
                  key: REGISTRY_ADDR
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - emu
                - cat
                - /dev/sysctl
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - emu
                - cat
                - /dev/sysctl
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
